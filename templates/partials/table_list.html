<div id="table-list"{% if oob %} hx-swap-oob="true"{% endif %}
     class="bg-zinc-900/60 border border-zinc-800 rounded-xl overflow-hidden">
  <div class="px-3 py-2.5 border-b border-zinc-800">
    <input type="text" x-model="q" placeholder="Filter tables…"
           class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-1.5 text-sm
                  text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-emerald-400">
  </div>
  <ul class="py-1 max-h-[70vh] overflow-y-auto">
    {% for t in tables %}
      <li x-show="q === '' || '{{ t.qualified|lower|escapejs }}'.includes(q.toLowerCase())">
        <button hx-get="{% url 'table_detail' connection.pk %}?schema={{ t.schema|urlencode }}&table={{ t.name|urlencode }}"
                hx-target="#detail" hx-swap="innerHTML"
                @click="sel = '{{ t.qualified|escapejs }}'"
                :class="sel === '{{ t.qualified|escapejs }}' ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-300'"
                class="w-full text-left px-3.5 py-1.5 text-sm flex items-center justify-between gap-2 hover:bg-zinc-800/60 transition">
          <span class="mono truncate">{{ t.name }}</span>
          <span class="text-xs text-zinc-400 shrink-0">{{ t.rows }}</span>
        </button>
      </li>
    {% endfor %}
  </ul>
  <div class="px-3.5 py-2 border-t border-zinc-800 text-xs text-zinc-400">
    {{ tables|length }} table{{ tables|length|pluralize }}
  </div>
</div><!-- /table box -->
