<div class="space-y-3">
  <div class="flex items-center gap-2 text-xs">
    <span class="text-zinc-300 font-medium">Query plan</span>
    {% if analyzed %}
      <span class="px-1.5 py-0.5 rounded bg-emerald-950/50 text-emerald-400 border border-emerald-900/60 text-[10px] uppercase tracking-wide">analyze</span>
    {% else %}
      <span class="px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-400 text-[10px] uppercase tracking-wide">estimate</span>
    {% endif %}
  </div>

  <pre class="bg-zinc-950 border border-zinc-800 rounded-lg p-4 text-xs mono text-zinc-200 overflow-x-auto whitespace-pre">{{ plan }}</pre>

  <form hx-post="{% url 'snapshot_save' connection.pk %}" hx-target="#explain-save" hx-swap="innerHTML"
        class="flex flex-wrap items-center gap-2">
    <input type="hidden" name="analyzed" value="{% if analyzed %}1{% else %}0{% endif %}">
    <textarea name="sql" class="hidden">{{ sql }}</textarea>
    <textarea name="plan_text" class="hidden">{{ plan }}</textarea>
    <input name="label" placeholder="Snapshot name (e.g. before index)" autocomplete="off"
           class="bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-1.5 text-sm text-zinc-100
                  w-64 focus:outline-none focus:border-emerald-400">
    <button type="submit"
            class="bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-medium rounded-lg px-4 py-1.5 text-sm">
      Save snapshot
    </button>
    <span id="explain-save" class="text-xs"></span>
  </form>
</div>
