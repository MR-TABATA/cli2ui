<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}cli2ui{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script>
    tailwind.config = { darkMode: "class" }
  </script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; }
    [x-cloak] { display: none !important; }

    /* Shared component classes — see STYLE.md. CDN Tailwind has no @apply, so
       these are raw CSS using the Tailwind zinc/emerald/red/amber/sky values.
       Colour = intent: emerald primary/success, red destructive, amber warning,
       sky info/link, zinc structure. */
    .btn { display: inline-flex; align-items: center; gap: .375rem; white-space: nowrap;
           border: 1px solid transparent; border-radius: .5rem; padding: .375rem .75rem;
           font-size: .875rem; line-height: 1.25rem; cursor: pointer;
           transition: color .15s, background-color .15s, border-color .15s; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-sm { padding: .25rem .5rem; font-size: .75rem; gap: .25rem; }
    .btn-primary { background: #34d399; color: #09090b; font-weight: 500; }
    .btn-primary:hover:not(:disabled) { background: #6ee7b7; }
    .btn-neutral { border-color: #3f3f46; color: #d4d4d8; }
    .btn-neutral:hover:not(:disabled) { border-color: #71717a; color: #f4f4f5; }
    .btn-danger { border-color: rgba(127,29,29,.6); color: rgba(248,113,113,.85); }
    .btn-danger:hover:not(:disabled) { border-color: #ef4444; color: #fecaca; }
    .btn-warn { border-color: rgba(120,53,15,.7); color: rgba(252,211,77,.9); }
    .btn-warn:hover:not(:disabled) { border-color: #f59e0b; color: #fde68a; }
    .btn-link { border: 0; padding: 0; background: none; color: rgba(125,211,252,.85); }
    .btn-link:hover:not(:disabled) { color: #bae6fd; }

    .field { background: #09090b; border: 1px solid #3f3f46; border-radius: .5rem;
             padding: .375rem .625rem; font-size: .875rem; color: #f4f4f5; }
    .field::placeholder { color: #52525b; }
    .field:focus { outline: none; border-color: #34d399; }
    .field-sm { padding: .25rem .5rem; font-size: .75rem; }
    /* htmx loading indicators: hidden until a request the element belongs to is
       in flight (used for the restore spinner). */
    .htmx-indicator { opacity: 0; transition: opacity .2s ease-in; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
    .spinner { display: inline-block; width: .9em; height: .9em; border: 2px solid currentColor;
               border-right-color: transparent; border-radius: 50%;
               animation: spin .6s linear infinite; vertical-align: -2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Global activity bar: an indeterminate sliding stripe (no fake %), shown
       only when an htmx request runs longer than ~300ms so quick panel swaps
       don't flash it but slow ops (dump/restore/drop) signal that work is on. */
    #htmx-activity { position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 50;
                     opacity: 0; transition: opacity .2s;
                     background: linear-gradient(90deg, transparent, #38bdf8, transparent);
                     background-size: 40% 100%; background-repeat: no-repeat;
                     animation: htmx-slide 1s linear infinite; }
    #htmx-activity.on { opacity: 1; }
    @keyframes htmx-slide { 0% { background-position: -40% 0; } 100% { background-position: 140% 0; } }
  </style>
  <script>
    // Backup downloads aren't htmx requests (they stream a file), so they can't
    // use hx-indicator. This Alpine component fetches the dump, shows an in-page
    // spinner while pg_dump runs, then triggers the browser download from the
    // blob — and surfaces the server's error text inline if it fails.
    document.addEventListener("alpine:init", () => {
      Alpine.data("dumpLinks", () => ({
        busy: false,
        err: "",
        async download(url) {
          this.busy = true; this.err = "";
          try {
            const r = await fetch(url);
            if (!r.ok) { this.err = (await r.text()).slice(0, 300) || "Backup failed."; return; }
            const blob = await r.blob();
            const m = (r.headers.get("Content-Disposition") || "").match(/filename="?([^"]+)"?/);
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = m ? m[1] : "backup";
            document.body.appendChild(a); a.click(); a.remove();
            URL.revokeObjectURL(a.href);
          } catch (e) { this.err = String(e); }
          finally { this.busy = false; }
        },
      }));
    });

    // Global htmx activity bar (see #htmx-activity CSS). Only reveal it if a
    // request outlasts a short grace period, so fast swaps stay flicker-free.
    (function () {
      let timer, bar;
      const show = () => {
        if (!bar) { bar = document.createElement("div"); bar.id = "htmx-activity"; document.body.appendChild(bar); }
        bar.classList.add("on");
      };
      document.addEventListener("htmx:beforeRequest", () => { timer = setTimeout(show, 300); });
      const hide = () => { clearTimeout(timer); if (bar) bar.classList.remove("on"); };
      document.addEventListener("htmx:afterRequest", hide);
    })();
  </script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
  <header class="border-b border-zinc-800 sticky top-0 bg-zinc-950/90 backdrop-blur z-10">
    <div class="max-w-7xl mx-auto px-6 py-3.5 flex items-center gap-3">
      <a href="/" class="text-lg font-semibold tracking-tight">
        cli<span class="text-emerald-400">2</span>ui
      </a>
      <span class="text-zinc-500 text-sm hidden sm:inline">CLI database ops, as buttons.</span>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
